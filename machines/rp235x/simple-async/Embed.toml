[default.general]
chip = "rp235x"

[default.flashing]
enabled = true

[default.reset]
enabled = true
halt_afterwards = false

[default.probe]
protocol = "Swd"
speed = 100

[default.rtt]
enabled = true
up_channels = [
  { channel = 0, mode = "NoBlockSkip", format = "Defmt", name = "defmt" }
]

tabs = [
  { up_channel = 0, name = "defmt" }
]

log_enabled = true
log_path = "./target/bench/logs"
