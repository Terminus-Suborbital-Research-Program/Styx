[default.general]
chip = "rp235x"

[default.flashing]
enabled = true

[default.reset]
enabled = true
halt_afterwards = false

[default.probe]
protocol = "Swd"
speed = 100

[default.rtt]
enabled = true
up_channels = [
  { channel = 0, mode = "NoBlockSkip", format = "String", name = "print" },
  { channel = 1, mode = "NoBlockSkip", format = "Defmt", name = "defmt" },
  { channel = 2, mode = "NoBlockSkip", format = "BinaryLE", name = "telemetry" }
]
down_channels = [
  { channel = 0, mode = "NoBlockSkip", format = "String", name = "commands" }
]

tabs = [
  { up_channel = 0, name = "print" },
  { up_channel = 1, name = "defmt" },
  { up_channel = 2, name = "telemetry" }
]

log_enabled = true
log_path = "./target/bench/logs"
